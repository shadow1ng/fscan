project_name: "fscan"

before:
  hooks:
    - go mod tidy
    - go mod download
    - chmod +x .github/scripts/build-lite.sh
    - bash .github/scripts/build-lite.sh {{ .Version }}

builds:
  # 标准版 - 全部插件
  - id: fscan
    binary: fscan
    main: .
    env:
      - CGO_ENABLED=0
    goos: [windows, linux, darwin]
    goarch: [amd64, arm64, "386"]
    goarm: ["7"]
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: windows
        goarch: arm64
    flags: [-trimpath]
    ldflags: -s -w -X github.com/shadow1ng/fscan/common.version={{ .Version }} -X github.com/shadow1ng/fscan/common.commit={{ .ShortCommit }} -X github.com/shadow1ng/fscan/common.date={{ .Date }}
    mod_timestamp: "{{ .CommitTimestamp }}"

  # 无本地插件版 - 排除本地模块
  - id: fscan-nolocal
    binary: fscan
    main: .
    env:
      - CGO_ENABLED=0
    goos: [windows, linux, darwin]
    goarch: [amd64, arm64, "386"]
    goarm: ["7"]
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: windows
        goarch: arm64
    flags: [-trimpath]
    tags: [no_local]
    ldflags: -s -w -X github.com/shadow1ng/fscan/common.version={{ .Version }} -X github.com/shadow1ng/fscan/common.commit={{ .ShortCommit }} -X github.com/shadow1ng/fscan/common.date={{ .Date }}
    mod_timestamp: "{{ .CommitTimestamp }}"

  # WebUI版 - 带Web管理界面
  - id: fscan-web
    binary: fscan
    main: .
    env:
      - CGO_ENABLED=0
    goos: [windows, linux, darwin]
    goarch: [amd64, arm64, "386"]
    goarm: ["7"]
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: windows
        goarch: arm64
    flags: [-trimpath]
    tags: [web]
    ldflags: -s -w -X github.com/shadow1ng/fscan/common.version={{ .Version }} -X github.com/shadow1ng/fscan/common.commit={{ .ShortCommit }} -X github.com/shadow1ng/fscan/common.date={{ .Date }}
    mod_timestamp: "{{ .CommitTimestamp }}"

upx:
  - ids: [fscan, fscan-nolocal, fscan-web]
    enabled: true
    goos: [windows, linux]
    goarch: [amd64, "386"]
    compress: best
    brute: false
    lzma: false

archives:
  # 标准版归档
  - id: fscan
    builds: [fscan]
    format: binary
    allow_different_binary_count: true
    name_template: >-
      fscan_{{ .Version }}_
      {{- if eq .Os "darwin" }}mac
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x64
      {{- else if eq .Arch "386" }}x32
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
      {{- if eq .Os "windows" }}.exe{{ end }}

  # 无本地插件版归档
  - id: fscan-nolocal
    builds: [fscan-nolocal]
    format: binary
    allow_different_binary_count: true
    name_template: >-
      fscan-nolocal_{{ .Version }}_
      {{- if eq .Os "darwin" }}mac
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x64
      {{- else if eq .Arch "386" }}x32
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
      {{- if eq .Os "windows" }}.exe{{ end }}

  # WebUI版归档
  - id: fscan-web
    builds: [fscan-web]
    format: binary
    allow_different_binary_count: true
    name_template: >-
      fscan-web_{{ .Version }}_
      {{- if eq .Os "darwin" }}mac
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x64
      {{- else if eq .Arch "386" }}x32
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
      {{- if eq .Os "windows" }}.exe{{ end }}

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^(docs|test|ci|chore):"
      - "Merge (pull request|branch)"
  groups:
    - title: "🚀 新功能"
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: "🐛 问题修复"
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: "🔧 其他改进"
      order: 999

release:
  github:
    owner: "{{ .Env.GITHUB_OWNER }}"
    name: "{{ .Env.GITHUB_REPO }}"
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## {{ .ProjectName }} {{ .Tag }}

    感谢使用 {{ .ProjectName }}！

    ### 版本说明

    | 版本 | 说明 |
    |------|------|
    | **fscan** | 标准版，包含全部插件（推荐） |
    | **fscan-nolocal** | 精简版，不含本地模块（体积更小） |
    | **fscan-web** | WebUI版，带Web管理界面 |

    ### 平台支持

    | 平台 | 架构 |
    |------|------|
    | Linux | x64, x32, arm64 |
    | Windows | x64, x32 |
    | macOS | x64, arm64 |
  footer: |
    **完整更新日志**: https://github.com/{{ .Env.GITHUB_OWNER }}/{{ .Env.GITHUB_REPO }}/compare/{{ .PreviousTag }}...{{ .Tag }}
  extra_files:
    - glob: ./dist-lite/*

snapshot:
  name_template: "{{ incpatch .Version }}-dev-{{ .ShortCommit }}"

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"
