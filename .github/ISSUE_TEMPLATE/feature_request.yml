name: ✨ 功能请求
description: 提议新功能或改进现有功能
title: "[Feature] "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        感谢您的功能建议！请描述清楚使用场景和期望行为。
        纯 "+1" 类请求请用 Reaction 表达，不要开新 Issue。

  - type: dropdown
    id: category
    attributes:
      label: 功能类别
      options:
        - 新扫描能力 (New Scan Capability)
        - 性能优化 (Performance)
        - 用户体验 (UX/CLI)
        - 输出格式 (Output Format)
        - 配置选项 (Configuration)
        - 嵌入式 SDK (Embedded SDK)
        - 集成/API (Integration/API)
        - 其他 (Other)
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 解决什么问题？
      description: 描述您的实际使用场景和痛点
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 描述您希望的功能行为，最好包含预期的命令行用法示例
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案（可选）
      description: 您目前的变通方法，或考虑过的其他方案

  - type: dropdown
    id: priority
    attributes:
      label: 优先级建议
      description: 您认为这个功能的重要程度
      options:
        - 高 - 核心场景缺失，严重影响使用
        - 中 - 明显改善体验
        - 低 - 锦上添花
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: 贡献意愿
      options:
        - label: 我愿意尝试实现这个功能并提交 PR
