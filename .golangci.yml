# golangci-lint v2 配置
version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - gocyclo
    - gocognit
  settings:
    govet:
      disable:
        - printf
    errcheck:
      check-type-assertions: true
      exclude-functions:
        - (net.Conn).Close
        - (*os.File).Close
        - os.Remove
        - (github.com/hirochachacha/go-smb2.Session).Logoff
        - (github.com/hirochachacha/go-smb2.Share).Umount
    gocyclo:
      min-complexity: 35
    gocognit:
      min-complexity: 80
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - gocognit
          - errcheck
      - linters:
          - govet
        text: "fieldalignment:"
    paths:
      - vendor
      - testdocker
      - image
      - libs/grdp

issues:
  max-issues-per-linter: 50
  max-same-issues: 3
